# Based on https://github.com/actions-rs/meta/blob/master/recipes/quickstart.md

on:
  push:
    paths:
      - '.github/**'
      - 'examples/**'
      - 'src/**'
      - 'Cargo.toml'

name: check

env:
  ACTIX_PORT: 8080
  
jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy, rustfmt
      - run: rustup component add --toolchain 1.91 clippy rustfmt
      # This repository does not commit Cargo.lock, so create it in CI first.
      - run: cargo generate-lockfile
      - run: cargo clippy --locked -- --deny warnings
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo publish --dry-run --locked --allow-dirty
